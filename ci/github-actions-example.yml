# Copy to .github/workflows/verify.yml and pin the Flutter version used by the project.
name: verify

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Resolve application dependencies
        run: flutter pub get

      - name: Resolve harness dependencies
        working-directory: tool/agent_harness
        run: dart pub get

      - name: Analyze harness
        working-directory: tool/agent_harness
        run: dart analyze

      - name: Test harness
        working-directory: tool/agent_harness
        run: dart test

      - name: Verify application
        run: dart run tool/harness.dart verify --all
