# Analyzer preset for applications that use the harness.
# Matches the local fl_init_analyzer defaults and keeps the nested harness
# package analyzed separately in its own package context.

include:
  - package:bloc_lint/recommended.yaml
  - package:very_good_analysis/analysis_options.yaml

formatter:
  page_width: 120
  trailing_commas: preserve

analyzer:
  errors:
    invalid_annotation_target: ignore
  exclude:
    - tool/agent_harness/**
    - tool/flutter_agentic_harness/**
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "**/*.gen.dart"
    - "**/*.mocks.dart"
    - "**/*.pb.dart"

linter:
  rules:
    prefer_int_literals: false
    omit_local_variable_types: false
    public_member_api_docs: false
    lines_longer_than_80_chars: false
